<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FotoVault</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/x-icon" href="faviconimage.png">
</head>
<body>

<div class="shell">

  <header>
    <div class="logo">Foto<span>Vault</span></div>
    //<div class="tagline">AWS S3 Storage</div>
  </header>

  <div class="tabs">
    <button class="tab active" id="tab-upload">Subir</button>
    <button class="tab" id="tab-gallery">Galería</button>
  </div>

  <div class="panel active" id="panel-upload">
    <div class="dropzone" id="dropzone">
      <input type="file" id="file-input" accept="image/*" multiple />
      <span class="drop-icon">📷</span>
      <div class="drop-title">Selecciona o arrastra imágenes</div>
      <div class="drop-sub">JPG · PNG · WEBP</div>
    </div>

    <div id="preview-strip"></div>

    <div id="progress-wrap">
      <div class="prog-outer">
        <div class="prog-inner" id="progress-bar"></div>
      </div>
      <div id="progress-label">Subiendo…</div>
    </div>

    <button class="btn" id="upload-btn" disabled>Subir imágenes</button>
  </div>

  <div class="panel" id="panel-gallery">
    <button class="btn btn-secondary" id="refresh-gallery-btn">Actualizar galería</button>
    <div id="gallery-grid"></div>
  </div>

</div>

<div id="toast"></div>

<script src="scripts.js"></script>
</body>
</html>

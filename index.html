<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FotoVault</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/x-icon" href="faviconimage.png">
  
</head>
<body>

<div class="modal-overlay" id="config-modal">
  <div class="modal">
    <h2>Configuración inicial</h2>
    <p>Ingresa la URL de tu Google Apps Script (Web App) desplegado.</p>
    <div class="field" style="margin-top:16px;">
      <label>URL del Apps Script</label>
      <input type="url" id="script-url-input" placeholder="https://script.google.com/macros/s/AKf.../exec" />
    </div>
    <button class="btn" id="save-config-btn">Guardar y continuar</button>
  </div>
</div>

<div class="shell">
  <header>
    <div class="logo">Foto<span>Vault</span></div>
    <div class="tagline">Google Drive<br/>Static Site</div>
  </header>

  <div class="tabs">
    <button class="tab active" id="tab-upload">↑ Subir</button>
    <button class="tab" id="tab-gallery">⊞ Galería</button>
    <button class="tab config-btn" title="Configuración">⚙</button>
  </div>

  <div class="panel active" id="panel-upload">
    <div class="dropzone" id="dropzone">
      <input type="file" id="file-input" accept="image/*" multiple />
      <span class="drop-icon">📸</span>
      <div class="drop-title">Selecciona o arrastra imágenes</div>
      <div class="drop-sub">JPG · PNG · WEBP · HEIC — múltiples archivos</div>
    </div>

    <div id="preview-strip"></div>

    <div class="field">
      <label>Descripción</label>
      <textarea id="description"></textarea>
    </div>

    <div id="progress-wrap">
      <div class="prog-outer">
        <div class="prog-inner" id="progress-bar"></div>
      </div>
      <div id="progress-label">Subiendo…</div>
    </div>

    <button class="btn" id="upload-btn" disabled>Subir a Google Drive</button>
  </div>

  <div class="panel" id="panel-gallery">
    <button class="btn btn-secondary" id="refresh-gallery-btn">↻ Actualizar galería</button>
    <div id="gallery-grid"></div>
  </div>
</div>

<div id="toast"></div>

<script src="scripts.js"></script>
</body>
</html>
